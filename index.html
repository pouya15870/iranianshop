<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فروشگاه ایرانیان</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .main-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 50px;
            color: #667eea;
        }
        .btn-custom {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50px;
            padding: 10px 30px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
    </style>
</head>
<body>
<div class="main-card">
    <div class="logo">
        <i class="fas fa-store"></i>
    </div>
    <h1>فروشگاه ایرانیان</h1>
    <p>به زودی با بهترین محصولات در خدمت شما خواهیم بود</p>
    <a href="#" class="btn-custom">ورود به سایت</a>
    <a href="#" class="btn-custom">عضویت</a>
    <hr>
    <small>پروژه در حال توسعه | برای اجرای کامل به هاست PHP نیاز دارد</small>
</div>
</body>
</html>
